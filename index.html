/* ── HELPERS ─────────────────────────────────────────────────── */
const fmt = v => v > 0 ? `+${v}` : `${v}`;

function buildNotation(sex, gVals, fluidG, oVals, fluidO) {
  if (!sex || gVals.length === 0 || oVals.length === 0) return "";
  const sg = [...gVals].sort((a, b) => a - b);
  const so = [...oVals].sort((a, b) => a - b);
  const gStr = (fluidG && sg.length > 1)
    ? `G${fmt(sg[0])}:${fmt(sg[sg.length - 1])}`
    : `G${sg.map(fmt).join(",")}`;
  const oStr = (fluidO && so.length > 1)
    ? `O${fmt(so[0])}:${fmt(so[so.length - 1])}`
    : `O${so.map(fmt).join(",")}`;
  return `${sex}; ${gStr}; ${oStr}`;
}

function petalPath(cx, cy, tx, ty, w) {
  const dx = tx - cx, dy = ty - cy;
  const len = Math.sqrt(dx * dx + dy * dy);
  if (len === 0) return "";
  const px = -dy / len * w, py = dx / len * w;
  const mx = (cx + tx) / 2, my = (cy + ty) / 2;
  return `M ${cx} ${cy} Q ${mx+px} ${my+py} ${tx} ${ty} Q ${mx-px} ${my-py} ${cx} ${cy} Z`;
}

/* ── ROSE SILHOUETTE (background only) ───────────────────────── */
function RoseBg() {
  const petals = [
    { d: petalPath(CX, CY, CX,      CY-3*U, 18), fill: T,  o: 0.25 },
    { d: petalPath(CX, CY, CX,      CY+3*U, 18), fill: T,  o: 0.25 },
    { d: petalPath(CX, CY, CX+3*U,  CY,     18), fill: T,  o: 0.25 },
    { d: petalPath(CX, CY, CX-3*U,  CY,     18), fill: T,  o: 0.25 },
    { d: petalPath(CX, CY, CX+3*U,  CY-3*U, 12), fill: TL, o: 0.18 },
    { d: petalPath(CX, CY, CX-3*U,  CY-3*U, 12), fill: TL, o: 0.18 },
    { d: petalPath(CX, CY, CX+3*U,  CY+3*U, 12), fill: TL, o: 0.18 },
    { d: petalPath(CX, CY, CX-3*U,  CY+3*U, 12), fill: TL, o: 0.18 },
  ];
  return (
    <g>
      <circle cx={CX} cy={CY} r={3*U + 14} fill={TP} opacity={0.38}/>
      {petals.map((p, i) => <path key={i} d={p.d} fill={p.fill} opacity={p.o}/>)}
      {/* Faint axis guides */}
      <line x1={CX-3*U} y1={CY} x2={CX+3*U} y2={CY} stroke={TL} strokeWidth={1} opacity={0.30}/>
      <line x1={CX} y1={CY-3*U} x2={CX} y2={CY+3*U} stroke={TL} strokeWidth={1} opacity={0.30}/>
    </g>
  );
}

/* ── GENDER SCALE SVG (vertical, interactive) ────────────────── */
/*
 * Y axis: +3 female at top (y = CY - 3U), -3 male at bottom (y = CY + 3U)
 * Points are toggled individually; fluid fills a line between outermost selected.
 */
function GenderScaleSVG({ vals, fluid, onChange, t }) {
  const toggle = p => onChange(vals.includes(p) ? vals.filter(v => v !== p) : [...vals, p]);

  const sorted   = [...vals].sort((a, b) => a - b);
  const hasRange = fluid && sorted.length >= 2;
  const rMin     = hasRange ? sorted[0]                   : null;
  const rMax     = hasRange ? sorted[sorted.length - 1]   : null;

  /* y-coordinate of point p */
  const py = p => CY - p * U;

  return (
    <svg width="100%" viewBox={`0 0 ${SZ} ${SZ}`}
      style={{ display: "block", margin: "0 auto", maxWidth: SZ, touchAction: "none" }}>

      <RoseBg/>

      {/* Track — vertical centre line */}
      <line x1={CX} y1={py(3)} x2={CX} y2={py(-3)}
        stroke="#ddeeed" strokeWidth={4} strokeLinecap="round"/>

      {/* Fluid range fill */}
      {hasRange && (
        <line x1={CX} y1={py(rMax)} x2={CX} y2={py(rMin)}
          stroke={TD} strokeWidth={4} strokeLinecap="round" opacity={0.85}/>
      )}

      {/* Y-axis labels — kept clear of the r=16 interactive circles */}
      <text x={CX} y={py(3) - 26}
        textAnchor="middle" dominantBaseline="auto"
        fill={TD} fontSize={12} fontFamily="DM Sans" fontWeight="600">
        {t.female}
      </text>
      <text x={CX} y={py(-3) + 34}
        textAnchor="middle" dominantBaseline="auto"
        fill={TD} fontSize={12} fontFamily="DM Sans" fontWeight="600">
        {t.male}
      </text>

      {/* 7 interactive points */}
      {PTS.map(p => {
        const selected = vals.includes(p);
        const inRange  = hasRange && p > rMin && p < rMax;
        return (
          <g key={p} onPointerDown={() => toggle(p)} style={{ cursor: "pointer" }}>
            {/* Enlarged transparent hit area for mobile */}
            <circle cx={CX} cy={py(p)} r={22} fill="transparent"/>
            {/* Visual circle */}
            <circle cx={CX} cy={py(p)} r={16}
              fill={selected ? TD : inRange ? TL : "white"}
              stroke={selected ? TD : inRange ? TL : "#d4e8e7"}
              strokeWidth={2.5}
              style={{ filter: selected ? "drop-shadow(0 2px 6px rgba(42,140,136,0.35))" : "none" }}
            />
            {/* Label — solo valore assoluto nella UI; il segno resta nel payload e nella notazione */}
            <text cx={CX} x={CX} y={py(p)} textAnchor="middle" dominantBaseline="middle"
              fontSize={10} fontFamily="DM Sans" fontWeight="700"
              fill={selected ? "white" : inRange ? TD : "#aabcbb"}
              style={{ pointerEvents: "none" }}>
              {Math.abs(p)}
            </text>
          </g>
        );
      })}
    </svg>
  );
}

/* ── ORIENTATION SCALE SVG (horizontal, interactive) ─────────── */
/*
 * X axis: -3 other sex at left (x = CX - 3U), +3 same sex at right (x = CX + 3U)
 * G markers (from previous step) shown as read-only coral dots on Y axis.
 */
function OrientScaleSVG({ gVals, fluidG, vals, fluid, onChange, t }) {
  const toggle = p => onChange(vals.includes(p) ? vals.filter(v => v !== p) : [...vals, p]);

  const sorted   = [...vals].sort((a, b) => a - b);
  const hasRange = fluid && sorted.length >= 2;
  const rMin     = hasRange ? sorted[0]                   : null;
  const rMax     = hasRange ? sorted[sorted.length - 1]   : null;

  const sg       = [...gVals].sort((a, b) => a - b);
  const gRange   = fluidG && sg.length >= 2;

  /* x-coordinate of point p */
  const px = p => CX + p * U;
  /* y-coordinate of gender point g */
  const gy = g => CY - g * U;

  /* X-axis label columns (rotated) */
  const XLBL_R = SZ - 9;
  const XLBL_L = 9;

  return (
    <svg width="100%" viewBox={`0 0 ${SZ} ${SZ}`}
      style={{ display: "block", margin: "0 auto", maxWidth: SZ, touchAction: "none" }}>

      <RoseBg/>

      {/* ── Gender markers (read-only) ── */}
      {/* Fluid range line on Y axis */}
      {gRange && (
        <line x1={CX} y1={gy(sg[0])} x2={CX} y2={gy(sg[sg.length - 1])}
          stroke={CR} strokeWidth={4} strokeLinecap="round" opacity={0.65}/>
      )}
      {/* Dot for each selected G value */}
      {gVals.map(g => (
        <circle key={g} cx={CX} cy={gy(g)} r={9}
          fill={CR} stroke="white" strokeWidth={2} opacity={0.88}/>
      ))}
      {/* Faint Y-axis labels for context — centred at CX, same alignment as gender scale */}
      <text x={CX} y={gy(3) - 24}
        textAnchor="middle" dominantBaseline="auto"
        fill={TD} fontSize={10} fontFamily="DM Sans" fontWeight="600" opacity={0.55}>
        {t.female}
      </text>
      <text x={CX} y={gy(-3) + 32}
        textAnchor="middle" dominantBaseline="auto"
        fill={TD} fontSize={10} fontFamily="DM Sans" fontWeight="600" opacity={0.55}>
        {t.male}
      </text>

      {/* ── Orientation track ── */}
      <line x1={px(-3)} y1={CY} x2={px(3)} y2={CY}
        stroke="#ddeeed" strokeWidth={4} strokeLinecap="round"/>

      {/* Fluid range fill */}
      {hasRange && (
        <line x1={px(rMin)} y1={CY} x2={px(rMax)} y2={CY}
          stroke={TD} strokeWidth={4} strokeLinecap="round" opacity={0.85}/>
      )}

      {/* X-axis labels — vertical (rotated) */}
      <text x={XLBL_R} y={CY}
        textAnchor="middle" dominantBaseline="middle"
        transform={`rotate(-90, ${XLBL_R}, ${CY})`}
        fill={TD} fontSize={11} fontFamily="DM Sans" fontWeight="600">
        {t.same}
      </text>
      <text x={XLBL_L} y={CY}
        textAnchor="middle" dominantBaseline="middle"
        transform={`rotate(-90, ${XLBL_L}, ${CY})`}
        fill={TD} fontSize={11} fontFamily="DM Sans" fontWeight="600">
        {t.other}
      </text>

      {/* 7 interactive points */}
      {PTS.map(p => {
        const selected = vals.includes(p);
        const inRange  = hasRange && p > rMin && p < rMax;
        return (
          <g key={p} onPointerDown={() => toggle(p)} style={{ cursor: "pointer" }}>
            <circle cx={px(p)} cy={CY} r={22} fill="transparent"/>
            <circle cx={px(p)} cy={CY} r={16}
              fill={selected ? TD : inRange ? TL : "white"}
              stroke={selected ? TD : inRange ? TL : "#d4e8e7"}
              strokeWidth={2.5}
              style={{ filter: selected ? "drop-shadow(0 2px 6px rgba(42,140,136,0.35))" : "none" }}
            />
            <text x={px(p)} y={CY} textAnchor="middle" dominantBaseline="middle"
              fontSize={10} fontFamily="DM Sans" fontWeight="700"
              fill={selected ? "white" : inRange ? TD : "#aabcbb"}
              style={{ pointerEvents: "none" }}>
              {Math.abs(p)}
            </text>
          </g>
        );
      })}
    </svg>
  );
}

  return (
    <div style={{ marginTop: 14 }}>

        <input type="checkbox" checked={checked} onChange={e => onChange(e.target.checked)}

        <span style={{ fontSize: 13, color: "#6a8a89", lineHeight: 1.45 }}>{label}</span>
      </label>
      {checked && (
        <p style={{ fontSize: 11, color: T, marginTop: 6, lineHeight: 1.5, fontStyle: "italic", paddingLeft: 25 }}>
          {hint}
        </p>

}

function StepDots({ current, total }) {
  return (
    <div style={{ display: "flex", justifyContent: "center", gap: 8, marginBottom: 20 }}>
      {Array.from({ length: total }).map((_, i) => (
        <div key={i} style={{
          width: i === current ? 20 : 7, height: 7,
          borderRadius: 4,
          background: i < current ? TL : i === current ? TD : "#d4e8e7",
          transition: "all 0.25s"
        }}/>
      ))}
    </div>
  );
}

/* ── DONE PLOT ───────────────────────────────────────────────── */
/*
 * Full wind rose with the participant's result plotted on it.
 * X axis = sexual orientation  (–3 other sex … +3 same sex)
 * Y axis = gender identity     (–3 male       … +3 female)
 *
 * Single point  → coral dot
 * Fluid G only  → vertical segment at each selected O, dots at endpoints
 * Fluid O only  → horizontal segment at each selected G, dots at endpoints
 * Both fluid    → filled coral rectangle spanning the range, with corner dots
 */
function DonePlot({ gVals, fluidG, oVals, fluidO, t }) {
  const DSZ = 320, DCX = 160, DCY = 160, DU = 32;

  const dpy = p => DCY - p * DU;   // gender  → y
  const dpx = p => DCX + p * DU;   // orient  → x

  const sg = [...gVals].sort((a, b) => a - b);
  const so = [...oVals].sort((a, b) => a - b);

  const useGRange = fluidG && sg.length > 1;
  const useORange = fluidO && so.length > 1;

  const gMin = sg[0],            gMax = sg[sg.length - 1];
  const oMin = so[0],            oMax = so[so.length - 1];

  /* All (g, o) combos for individual dots */
  const combos = [];
  for (const g of gVals) for (const o of oVals) combos.push({ g, o });

  /* Petal definitions reuse the same helper */
  const petals = [
    { d: petalPath(DCX, DCY, DCX,       DCY-3*DU, 18), fill: T,  o: 0.25 },
    { d: petalPath(DCX, DCY, DCX,       DCY+3*DU, 18), fill: T,  o: 0.25 },
    { d: petalPath(DCX, DCY, DCX+3*DU,  DCY,      18), fill: T,  o: 0.25 },
    { d: petalPath(DCX, DCY, DCX-3*DU,  DCY,      18), fill: T,  o: 0.25 },
    { d: petalPath(DCX, DCY, DCX+3*DU,  DCY-3*DU, 12), fill: TL, o: 0.18 },
    { d: petalPath(DCX, DCY, DCX-3*DU,  DCY-3*DU, 12), fill: TL, o: 0.18 },
    { d: petalPath(DCX, DCY, DCX+3*DU,  DCY+3*DU, 12), fill: TL, o: 0.18 },
    { d: petalPath(DCX, DCY, DCX-3*DU,  DCY+3*DU, 12), fill: TL, o: 0.18 },
  ];

  /* Grid dots */
  const gridDots = [];
  for (let g = -3; g <= 3; g++)
    for (let o = -3; o <= 3; o++)
      gridDots.push({ x: dpx(o), y: dpy(g) });

  return (
    <svg width="100%" viewBox={`0 0 ${DSZ} ${DSZ}`}
      style={{ display: "block", margin: "0 auto", maxWidth: DSZ }}>

      {/* Background */}
      <circle cx={DCX} cy={DCY} r={3*DU + 14} fill={TP} opacity={0.38}/>

      {/* Petals */}
      {petals.map((p, i) => <path key={i} d={p.d} fill={p.fill} opacity={p.o}/>)}

      {/* Faint grid lines */}
      {[-3,-2,-1,1,2,3].map(v => (
        <g key={v} opacity={0.10}>
          <line x1={dpx(v)} y1={DCY-3*DU} x2={dpx(v)} y2={DCY+3*DU} stroke="#4a7a78" strokeWidth={1}/>
          <line x1={DCX-3*DU} y1={dpy(v)} x2={DCX+3*DU} y2={dpy(v)} stroke="#4a7a78" strokeWidth={1}/>
        </g>
      ))}

      {/* Grid dots */}
      {gridDots.map((d, i) => <circle key={i} cx={d.x} cy={d.y} r={2} fill="white" opacity={0.45}/>)}

      {/* Axes */}
      <line x1={DCX-3*DU} y1={DCY} x2={DCX+3*DU} y2={DCY} stroke={TL} strokeWidth={1} opacity={0.30}/>
      <line x1={DCX} y1={DCY-3*DU} x2={DCX} y2={DCY+3*DU} stroke={TL} strokeWidth={1} opacity={0.30}/>

      {/* ── Axis labels ── */}
      {/* Y axis — horizontal, above/below */}
      <text x={DCX} y={dpy(3) - 26}
        textAnchor="middle" dominantBaseline="auto"
        fill={TD} fontSize={11} fontFamily="DM Sans" fontWeight="600">
        {t.female}
      </text>
      <text x={DCX} y={dpy(-3) + 34}
        textAnchor="middle" dominantBaseline="auto"
        fill={TD} fontSize={11} fontFamily="DM Sans" fontWeight="600">
        {t.male}
      </text>

      {/* X axis — vertical (rotated), left/right */}
      <text x={DSZ - 9} y={DCY}
        textAnchor="middle" dominantBaseline="middle"
        transform={`rotate(-90, ${DSZ - 9}, ${DCY})`}
        fill={TD} fontSize={11} fontFamily="DM Sans" fontWeight="600">
        {t.same}
      </text>
      <text x={9} y={DCY}
        textAnchor="middle" dominantBaseline="middle"
        transform={`rotate(-90, 9, ${DCY})`}
        fill={TD} fontSize={11} fontFamily="DM Sans" fontWeight="600">
        {t.other}
      </text>

      {/* ── User result marker ── */}

      {/* CASE: both fluid → filled rectangle */}
      {useGRange && useORange && (
        <rect
          x={dpx(oMin)} y={dpy(gMax)}
          width={dpx(oMax) - dpx(oMin)}
          height={dpy(gMin) - dpy(gMax)}
          fill={CR} opacity={0.22} rx={4}
        />
      )}

      {/* Fluid-G lines: vertical segment for each selected O */}
      {useGRange && so.map(o => (
        <line key={`fg${o}`}
          x1={dpx(o)} y1={dpy(gMin)}
          x2={dpx(o)} y2={dpy(gMax)}
          stroke={CR} strokeWidth={useORange ? 1.5 : 4}
          strokeLinecap="round" opacity={0.78}/>
      ))}

      {/* Fluid-O lines: horizontal segment for each selected G */}
      {useORange && sg.map(g => (
        <line key={`fo${g}`}
          x1={dpx(oMin)} y1={dpy(g)}
          x2={dpx(oMax)} y2={dpy(g)}
          stroke={CR} strokeWidth={useGRange ? 1.5 : 4}
          strokeLinecap="round" opacity={0.78}/>
      ))}

      {/* Single crosshair only when exactly one point */}
      {combos.length === 1 && (() => {
        const { g, o } = combos[0];
        return <>
          <line x1={dpx(o)} y1={DCY} x2={dpx(o)} y2={dpy(g)}
            stroke={CR} strokeWidth={1} strokeDasharray="3 3" opacity={0.35}/>
          <line x1={DCX} y1={dpy(g)} x2={dpx(o)} y2={dpy(g)}
            stroke={CR} strokeWidth={1} strokeDasharray="3 3" opacity={0.35}/>
        </>;
      })()}

      {/* Coral dots at every (g, o) combination */}
      {combos.map(({ g, o }, i) => (
        <circle key={i} cx={dpx(o)} cy={dpy(g)}
          r={9} fill={CR} stroke="white" strokeWidth={2.5} opacity={0.92}/>
      ))}
    </svg>
  );
}

/* ── APP ─────────────────────────────────────────────────────── */
/*
 * Phases: intro → sex → identity → drawG → drawO → done
 */
function App() {
  const [lang,      setLang]      = useState("it");
  const [phase,     setPhase]     = useState("intro");
  const [timepoint, setTimepoint] = useState("");          // "T1" | "T2"
  const [participantToken, setParticipantToken] = useState(""); // token inserito da utente T2
  const [generatedToken,   setGeneratedToken]   = useState(""); // token generato a fine T1
  const [copied,    setCopied]    = useState(false);
  const [consent,   setConsent]   = useState(false);
  const [sex,       setSex]       = useState(null);
  const [age,       setAge]       = useState("");
  const [genderLbl, setGenderLbl] = useState("");
  const [orientLbl, setOrientLbl] = useState("");
  const [gVals,     setGVals]     = useState([]);
  const [fluidG,    setFluidG]    = useState(false);
  const [oVals,     setOVals]     = useState([]);
  const [fluidO,    setFluidO]    = useState(false);
  const [busy,      setBusy]      = useState(false);
  const [errMsg,    setErrMsg]    = useState("");

  const t = L[lang];

  /* genderOpts dipende dal sesso biologico selezionato */
  const genderOpts = sex === "Y" ? t.genderOptsAMAB : t.genderOptsAFAB;

  const generateToken = () => {
    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // no O/0/I/1 per leggibilità
    let token = "";
    for (let i = 0; i < 6; i++) token += chars[Math.floor(Math.random() * chars.length)];
    return token;
  };

  const reset = () => {
    setPhase("intro"); setConsent(false); setSex(null); setTimepoint("");
    setParticipantToken(""); setGeneratedToken(""); setCopied(false);
    setAge(""); setGenderLbl(""); setOrientLbl("");
    setGVals([]); setFluidG(false); setOVals([]); setFluidO(false);
    setBusy(false); setErrMsg("");
  };

  const notation  = buildNotation(sex, gVals, fluidG, oVals, fluidO);
  const ageValid  = age && parseInt(age) >= 10 && parseInt(age) <= 99;
  const tokenOk   = timepoint === "T1" || (timepoint === "T2" && participantToken.trim().length >= 4);
  const canSubmit = !!(timepoint && tokenOk && sex && ageValid && gVals.length > 0 && oVals.length > 0 && genderLbl && orientLbl);

  

  const submit = async () => {
    if (!canSubmit || busy) return;
    setBusy(true); setErrMsg("");
    const sg = [...gVals].sort((a, b) => a - b);
    const so = [...oVals].sort((a, b) => a - b);
    const token = timepoint === "T1" ? generateToken() : participantToken.trim().toUpperCase();
    if (timepoint === "T1") setGeneratedToken(token);
    const payload = {
      timestamp:    new Date().toISOString(),
      timepoint,
      token,
      lang, sex,
      age:          age || "",
      genderLabel:  genderLbl,
      orientLabel:  orientLbl,
      genderScores: sg.join(","),
      fluidGender:  fluidG,
      orientScores: so.join(","),
      fluidOrient:  fluidO,
      notation,
    };
    try {
      await fetch(WEBHOOK, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify(payload)
      });
      setPhase("done");
    } catch {
      setErrMsg(t.errMsg);
    } finally {
      setBusy(false);
    }
  };

  /* Language toggle */
  const LangToggle = () => (
    <div style={{ width: "100%", maxWidth: 480, display: "flex", justifyContent: "flex-end", marginBottom: 8 }}>
      {["en","it"].map(l => (
        <button key={l} onClick={() => setLang(l)} style={{
          background: lang === l ? TD : "transparent",
          color: lang === l ? "white" : "#9ab",
          border: `1.5px solid ${lang === l ? TD : "#d4e8e7"}`,
          borderRadius: 7, padding: "4px 13px", marginLeft: 6,
          fontSize: 11, fontWeight: "700", cursor: "pointer",
          fontFamily: "'DM Sans', sans-serif", letterSpacing: 1
        }}>{l.toUpperCase()}</button>
      ))}
    </div>
  );

  /* ─── INTRO ─────────────────────────────────────────────────── */
  if (phase === "intro") {
    const tpBtn = (val, label) => (
      <button key={val} onClick={() => { setTimepoint(val); setParticipantToken(""); }}
        style={{
          flex: 1, padding: "13px 10px", borderRadius: 10, cursor: "pointer",
          border: `2px solid ${timepoint === val ? TD : "#d4e8e7"}`,
          background: timepoint === val ? TP : "white",
          color: timepoint === val ? TD : "#8aabaa",
          fontSize: 13, fontWeight: timepoint === val ? "700" : "400",
          fontFamily: "'DM Sans', sans-serif", transition: "all 0.15s"
        }}>{label}</button>
    );
    const canBegin = consent && timepoint && (timepoint === "T1" || participantToken.trim().length >= 4);
    return (
      <div style={wrap}>
        <LangToggle/>
        <div style={card}>
          <div style={{ textAlign: "center", marginBottom: 24 }}>
            <div style={{ fontSize: 48, lineHeight: 1, marginBottom: 8 }}>🌹</div>
            <h1 style={{ fontFamily: "'DM Serif Display', serif", color: TD, fontSize: 34, letterSpacing: 3, marginBottom: 2 }}>
              {t.roseTitle}
            </h1>
            <div style={{ color: TL, fontSize: 12, fontWeight: "600", letterSpacing: 5 }}>{t.roseSub}</div>
          </div>
          <p style={{ color: "#4a6665", lineHeight: 1.7, fontSize: 14, marginBottom: 10 }}>
            {t.p1a}<strong style={{ color: "#333" }}>{t.p1b}</strong>
            {t.p1c}<strong style={{ color: TD }}>{t.p1d}</strong>
            {t.p1e}<strong style={{ color: TD }}>{t.p1f}</strong>{t.p1g}
          </p>
          <p style={{ color: "#8aabaa", lineHeight: 1.7, fontSize: 13, marginBottom: 22 }}>
            {t.p2a}<strong style={{ color: "#6a8a89" }}>{t.p2b}</strong>{t.p2c}
          </p>

          {/* Selettore T1 / T2 */}
          <div style={{ marginBottom: 18 }}>
            <div style={{ fontSize: 13, color: "#6a8a89", fontWeight: "600", marginBottom: 10 }}>
              {t.timepointQ}
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              {tpBtn("T1", t.tp1)}
              {tpBtn("T2", t.tp2)}
            </div>
          </div>

          {/* Campo token — visibile solo se T2 */}
          {timepoint === "T2" && (
            <div style={{ marginBottom: 18 }}>
              <label style={{ fontSize: 13, color: "#6a8a89", fontWeight: "600", display: "block", marginBottom: 8 }}>
                {t.tokenInputLabel}
              </label>
              <input
                type="text"
                value={participantToken}
                onChange={e => setParticipantToken(e.target.value.toUpperCase())}
                placeholder={t.tokenInputPh}
                maxLength={8}
                style={{
                  width: "100%", padding: "11px 14px",
                  border: `1.5px solid ${TD}`, borderRadius: 9,
                  fontSize: 16, fontWeight: "700", letterSpacing: 3,
                  outline: "none", fontFamily: "'DM Sans', sans-serif",
                  color: TD, background: TP, textTransform: "uppercase"
                }}
              />
              <p style={{ fontSize: 11, color: "#8aabaa", marginTop: 6, lineHeight: 1.5 }}>
                {t.tokenInputHint}
              </p>
            </div>
          )}

          <label style={{
            display: "flex", alignItems: "flex-start", gap: 11, cursor: "pointer",
            background: TP, borderRadius: 10, padding: "14px", marginBottom: 22
          }}>
            <input type="checkbox" checked={consent} onChange={e => setConsent(e.target.checked)}
              style={{ marginTop: 2, accentColor: TD, width: 17, height: 17, flexShrink: 0 }}/>
            <span style={{ fontSize: 13, color: "#4a6665", lineHeight: 1.55 }}>{t.consentText}</span>
          </label>
          <button onClick={() => setPhase("sex")} disabled={!canBegin}
            style={Btn(canBegin ? TD : "#c8dede", "white", { width: "100%", fontSize: 15 })}>
            {t.begin}
          </button>
        </div>
      </div>
    );
  }

  /* ─── SEX ───────────────────────────────────────────────────── */
  if (phase === "sex") return (
    <div style={wrap}>
      <LangToggle/>
      <div style={card}>
        <StepDots current={0} total={4}/>
        <h2 style={{ fontFamily: "'DM Serif Display', serif", color: TD, fontSize: 22, marginBottom: 6 }}>
          {t.sexTitle}
        </h2>
        <p style={{ color: "#8aabaa", fontSize: 13, marginBottom: 22 }}>{t.sexSub}</p>

        {/* Età obbligatoria */}
        <div style={{ marginBottom: 22 }}>
          <label style={{ fontSize: 13, color: "#6a8a89", fontWeight: "600", display: "block", marginBottom: 8 }}>
            {t.ageQ} <span style={{ fontWeight: 400, color: "#b0cac9" }}>{t.ageReq}</span>
          </label>
          <input type="number" value={age} onChange={e => setAge(e.target.value)}
            min={10} max={99} placeholder="—"
            style={{
              width: 100, padding: "10px 14px",
              border: `1.5px solid ${ageValid || !age ? "#d4e8e7" : CR}`,
              borderRadius: 9,
              fontSize: 14, outline: "none", fontFamily: "'DM Sans', sans-serif", color: "#333"
            }}/>
        </div>

        <div style={{ display: "flex", gap: 14, marginBottom: 16 }}>
          {[
            { val: "X", symbol: "\u2640", label: t.afab },
            { val: "Y", symbol: "\u2642", label: t.amab }
          ].map(opt => (
            <button key={opt.val} onPointerDown={() => setSex(opt.val)} style={{
              flex: 1, padding: "22px 12px", borderRadius: 14, cursor: "pointer",
              border: `2px solid ${sex === opt.val ? TD : "#d4e8e7"}`,
              background: sex === opt.val ? TP : "white", textAlign: "center",
              transition: "all 0.15s",
              boxShadow: sex === opt.val ? "0 4px 16px rgba(42,140,136,0.18)" : "none"
            }}>
              <div style={{ fontSize: 42, marginBottom: 10, color: sex === opt.val ? TD : "#8aabaa" }}>
                {opt.symbol}
              </div>
              <div style={{
                fontSize: 11, color: sex === opt.val ? TD : "#8aabaa",
                fontWeight: "600", whiteSpace: "pre-line", lineHeight: 1.45
              }}>{opt.label}</div>
            </button>
          ))}
        </div>
        <p style={{ fontSize: 11, color: "#b0cac9", lineHeight: 1.55, marginBottom: 22 }}>{t.dsd}</p>
        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={() => setPhase("intro")}
            style={Btn("white", "#8aabaa", { border: "1.5px solid #d4e8e7", flex: 1 })}>{t.back}</button>
          <button onClick={() => setPhase("drawG")} disabled={!sex || !ageValid}
            style={Btn(sex && ageValid ? TD : "#c8dede", "white", { flex: 1 })}>{t.next}</button>
        </div>
      </div>
    </div>
  );

  /* ─── IDENTITY ──────────────────────────────────────────────── */
  if (phase === "identity") {
    const optBtn = (label, selected, onClick) => (
      <button key={label} onClick={onClick} style={{
        display: "block", width: "100%", textAlign: "left",
        padding: "10px 14px", marginBottom: 6, borderRadius: 9,
        border: `1.5px solid ${selected ? TD : "#d4e8e7"}`,
        background: selected ? TP : "white",
        color: selected ? TD : "#4a6665",
        fontSize: 13, fontWeight: selected ? "600" : "400",
        cursor: "pointer", transition: "all 0.12s",
        fontFamily: "'DM Sans', sans-serif"
      }}>{label}</button>
    );
    const identOk = !!(genderLbl && orientLbl);
    return (
      <div style={wrap}>
        <LangToggle/>
        <div style={card}>
          <StepDots current={3} total={4}/>
          <h2 style={{ fontFamily: "'DM Serif Display', serif", color: TD, fontSize: 22, marginBottom: 20 }}>
            {t.identityTitle}
          </h2>
          {/* Gender label — opzioni dipendenti dal sesso biologico */}
          <div style={{ marginBottom: 22 }}>
            <label style={{ fontSize: 13, color: "#6a8a89", fontWeight: "600", display: "block", marginBottom: 10 }}>
              {t.genderQ}
            </label>
            {genderOpts.map(o => optBtn(o, genderLbl === o, () => setGenderLbl(o)))}
          </div>
          {/* Orientation label */}
          <div style={{ marginBottom: 24 }}>
            <label style={{ fontSize: 13, color: "#6a8a89", fontWeight: "600", display: "block", marginBottom: 10 }}>
              {t.orientQ}
            </label>
            {t.orientOpts.map(o => optBtn(o, orientLbl === o, () => setOrientLbl(o)))}
          </div>

          {/* Notation preview */}
          {notation && (
            <div style={{
              background: TP, borderRadius: 11,
              padding: "12px 16px", textAlign: "center",
              marginBottom: 18, border: `1px solid ${TL}`
            }}>
              <div style={{ fontSize: 11, color: "#8aabaa", marginBottom: 4, fontWeight: 500 }}>{t.notLbl}</div>
              <div style={{
                fontFamily: "'DM Serif Display', serif",
                fontSize: 22, color: TD, letterSpacing: 1
              }}>{notation}</div>
            </div>
          )}

          {errMsg && <p style={{ color: CR, fontSize: 13, textAlign: "center", marginTop: 12 }}>{errMsg}</p>}

          <div style={{ display: "flex", gap: 10, marginTop: 4 }}>
            <button onClick={() => setPhase("drawO")}
              style={Btn("white", "#8aabaa", { border: "1.5px solid #d4e8e7", flex: 1 })}>{t.back}</button>
            <button onClick={submit} disabled={!identOk || busy}
              style={Btn(identOk ? TD : "#c8dede", "white", { flex: 1 })}>
              {busy ? t.saving : t.submit}
            </button>
          </div>
        </div>
      </div>
    );
  }

  /* ─── DRAW G (vertical gender scale on rose) ────────────────── */
  if (phase === "drawG") return (
    <div style={wrap}>
      <LangToggle/>
      <div style={card}>
        <StepDots current={1} total={4}/>
        <h2 style={{
          fontFamily: "'DM Serif Display', serif",
          color: TD, fontSize: 22, marginBottom: 6
        }}>{t.genderScaleTitle}</h2>
        <p style={{ fontSize: 13, color: "#8aabaa", lineHeight: 1.6, marginBottom: 16 }}>
          {t.genderDesc}
        </p>

        {/* Scale endpoint labels above/below the SVG for orientation */}
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4, padding: "0 8px" }}>
          <span style={{ fontSize: 11, color: "#8aabaa", fontWeight: 500 }}>{t.genderLeft}</span>
          <span style={{ fontSize: 11, color: "#8aabaa", fontWeight: 500, textAlign: "right" }}>{t.genderRight}</span>
        </div>

        <GenderScaleSVG
          vals={gVals} fluid={fluidG}
          onChange={setGVals}
          t={t}
        />

        <FluidBox
          checked={fluidG}
          onChange={v => { setFluidG(v); if (!v) setGVals(gVals); }}
          label={t.fluidLabel}
          hint={t.fluidHint}
        />

        <div style={{ display: "flex", gap: 10, marginTop: 22 }}>
          <button onClick={() => setPhase("sex")}
            style={Btn("white", "#8aabaa", { border: "1.5px solid #d4e8e7", flex: 1 })}>{t.back}</button>
          <button onClick={() => setPhase("drawO")} disabled={gVals.length === 0}
            style={Btn(gVals.length > 0 ? TD : "#c8dede", "white", { flex: 1 })}>{t.next}</button>
        </div>
      </div>
    </div>
  );

  /* ─── DRAW O (horizontal orientation scale on rose) ─────────── */
  if (phase === "drawO") return (
    <div style={wrap}>
      <LangToggle/>
      <div style={card}>
        <StepDots current={2} total={4}/>
        <h2 style={{
          fontFamily: "'DM Serif Display', serif",
          color: TD, fontSize: 22, marginBottom: 6
        }}>{t.orientScaleTitle}</h2>
        <p style={{ fontSize: 13, color: "#8aabaa", lineHeight: 1.6, marginBottom: 16 }}>
          {t.orientDesc}
        </p>

        <OrientScaleSVG
          gVals={gVals} fluidG={fluidG}
          vals={oVals} fluid={fluidO}
          onChange={setOVals}
          t={t}
        />

        <FluidBox
          checked={fluidO}
          onChange={setFluidO}
          label={t.orientFluidLabel}
          hint={t.orientFluidHint}
        />

        {/* Notation preview */}
        {notation && (
          <div style={{
            background: TP, borderRadius: 11,
            padding: "12px 16px", textAlign: "center",
            marginTop: 18, border: `1px solid ${TL}`
          }}>
            <div style={{ fontSize: 11, color: "#8aabaa", marginBottom: 4, fontWeight: 500 }}>{t.notLbl}</div>
            <div style={{
              fontFamily: "'DM Serif Display', serif",
              fontSize: 22, color: TD, letterSpacing: 1
            }}>{notation}</div>
          </div>
        )}

        {errMsg && <p style={{ color: CR, fontSize: 13, textAlign: "center", marginTop: 12 }}>{errMsg}</p>}

        <div style={{ display: "flex", gap: 10, marginTop: 20 }}>
          <button onClick={() => setPhase("drawG")}
            style={Btn("white", "#8aabaa", { border: "1.5px solid #d4e8e7", flex: 1 })}>{t.back}</button>
          <button onClick={() => setPhase("identity")} disabled={oVals.length === 0}
            style={Btn(oVals.length > 0 ? TD : "#c8dede", "white", { flex: 1 })}>{t.next}</button>
        </div>
      </div>
    </div>
  );

  /* ─── DONE ──────────────────────────────────────────────────── */
  return (
    <div style={{ ...wrap, justifyContent: "center" }}>
      <div style={{ ...card, textAlign: "center", padding: "32px 20px 40px" }}>
        <div style={{ fontSize: 60, marginBottom: 10 }}>🌹</div>
        <h2 style={{ fontFamily: "'DM Serif Display', serif", color: TD, fontSize: 28, marginBottom: 6 }}>
          {t.doneTitle}
        </h2>
        <p style={{ color: "#9ab", fontSize: 14, marginBottom: 20 }}>
          {timepoint === "T2" ? t.doneSubT2 : t.doneSub}
        </p>

        {/* Token box — solo T1 */}
        {timepoint === "T1" && generatedToken && (
          <div style={{
            background: "#fff8e7", borderRadius: 14,
            padding: "20px 20px 16px", marginBottom: 22,
            border: "2px solid #f5c842"
          }}>
            <div style={{ fontSize: 12, color: "#b8860b", fontWeight: "600", marginBottom: 10, letterSpacing: 0.5 }}>
              ⚠️ {t.doneTokenLabel}
            </div>
            <div style={{
              fontFamily: "'DM Serif Display', serif",
              fontSize: 38, color: "#b8860b", letterSpacing: 8,
              marginBottom: 12, fontWeight: "700"
            }}>
              {generatedToken}
            </div>
            <button
              onClick={() => { navigator.clipboard.writeText(generatedToken).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2500); }); }}
              style={Btn(copied ? "#4da84a" : "#f5c842", "white", { padding: "9px 24px", fontSize: 13, marginBottom: 12 })}>
              {copied ? t.doneCopied : t.doneCopyBtn}
            </button>
            <p style={{ fontSize: 12, color: "#9a7a1a", lineHeight: 1.55, margin: 0 }}>
              {t.doneTokenInstr}
            </p>
          </div>
        )}

        {/* Wind rose with plotted result */}
        <DonePlot
          gVals={gVals} fluidG={fluidG}
          oVals={oVals} fluidO={fluidO}
          t={t}
        />

        {/* Notation */}
        <div style={{
          background: TP, borderRadius: 12,
          padding: "16px 20px", margin: "20px 0 28px",
          border: `1px solid ${TL}`
        }}>
          <div style={{ fontSize: 11, color: "#9ab", marginBottom: 6, fontWeight: 500 }}>{t.doneLabel}</div>
          <div style={{ fontFamily: "'DM Serif Display', serif", fontSize: 24, color: TD, letterSpacing: 1 }}>
            {notation}
          </div>
        </div>

        <button onClick={reset} style={Btn(TD, "white", { padding: "14px 36px", fontSize: 15 })}>
          {t.newResp}
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
